{% extends "admin/change_list.html" %}
{% block content_title %}
    <h1> Bike Rental Records </h1>
    <div style="display: flex; gap: 20px; margin: 10px 0; padding: 15px; background: #f8f9fa; border-left: 5px solid #0d6efd; border-radius: 5px;">
        <div>
            <strong style="color: #666; font-size: 0.8rem; text-transform: uppercase;">Today's Revenue (Total)</strong>
            <div style="font-size: 1.5rem; font-weight: bold; color: #212529;">{{ today_total }}</div>
        </div>
        <div style="border-left: 1px solid #ddd; padding-left: 20px;">
            <strong style="color: #666; font-size: 0.8rem; text-transform: uppercase;">Today's Collected (Paid)</strong>
            <div style="font-size: 1.5rem; font-weight: bold; color: #198754;">{{ today_paid }}</div>
        </div>
    </div>
    {{ block.super }}
{% endblock %}
