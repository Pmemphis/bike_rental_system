<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Login - Bike Rental System</title>
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .btn-primary {
            background-color: #0d6efd;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
        }
    </style>
</head>
<body>

    <div class="container p-3">
        <div class="card login-card p-4 mx-auto bg-white">
            <div class="text-center mb-4">
                <div class="display-5 mb-2">🚲</div>
                <h2 class="fw-bold text-dark">Welcome Back</h2>
                <p class="text-muted small">Sign in to manage your bike rental</p>
            </div>

            {% if form.errors %}
                <div class="alert alert-danger py-2 text-center" role="alert" style="font-size: 0.85rem;">
                    Invalid username or password. Please try again.
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="id_username" class="form-label small fw-bold text-secondary">Username (University ID)</label>
                    <input type="text" name="username" id="id_username" class="form-control" placeholder="e.g. REG/1234/2024" required autofocus>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label for="id_password" class="form-label small fw-bold text-secondary">Password</label>
                        <a href="{% url 'password_reset' %}" class="text-decoration-none small">Forgot?</a>
                    </div>
                    <input type="password" name="password" id="id_password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 shadow-sm mb-3">Login to Dashboard</button>
            </form>

            <div class="text-center mt-3 pt-3 border-top">
                <p class="mb-1">New student? <a href="{% url 'register' %}" class="text-decoration-none fw-bold">Create an account</a></p>
                <p class="mb-0 mt-3"><a href="/admin" class="text-muted small">Staff/Admin Portal</a></p>
            </div>
        </div>
    </div>

</body>
</html>
