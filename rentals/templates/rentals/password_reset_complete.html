<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Password Reset Successful - RideNow</title>
    <style>
        body { background-color: #f8f9fa; }
        .success-card { max-width: 400px; margin: 100px auto; border-radius: 20px; border: none; }
        .success-icon { font-size: 4rem; color: #198754; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card success-card shadow p-5 text-center">
            <div class="success-icon mb-3">✅</div>
            <h3 class="fw-bold mb-3">Success!</h3>
            <p class="text-muted mb-4">Your password has been set. You may now log in with your new credentials.</p>
            
            <a href="{% url 'login' %}" class="btn btn-primary w-100 py-2 fw-bold rounded-pill">
                Log In Now
            </a>
        </div>
    </div>
</body>
</html>
