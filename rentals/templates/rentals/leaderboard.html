<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Leaderboard - RideNow</title>
    <style>
        .podium-card { border: none; border-radius: 20px; transition: transform 0.3s; }
        .podium-1 { background: linear-gradient(135deg, #ffd700, #ffae00); color: white; transform: scale(1.1); z-index: 2; }
        .podium-2 { background: #e0e0e0; }
        .podium-3 { background: #cd7f32; color: white; }
        .rank-circle { width: 30px; height: 30px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; background: #eee; margin-right: 10px; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-4" style="max-width: 500px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0">Rider Rankings</h3>
            <a href="{% url 'dashboard' %}" class="btn btn-sm btn-outline-secondary">Back</a>
        </div>
        
        <p class="text-center text-muted mb-4 small text-uppercase fw-bold">Top Riders in {{ current_month }}</p>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <ul class="list-group list-group-flush">
                {% for rider in top_riders %}
                    <li class="list-group-item d-flex justify-content-between align-items-center p-3 {% if rider == request.user %}bg-primary-subtle{% endif %}">
                        <div class="d-flex align-items-center">
                            <span class="rank-circle">{{ forloop.counter }}</span>
                            <div>
                                <h6 class="mb-0 fw-bold">{{ rider.username }}</h6>
                                <small class="text-muted">Power User</small>
                            </div>
                        </div>
                        <div class="text-end">
                            <span class="badge bg-primary rounded-pill">
                                {{ rider.total_minutes.total_seconds|divisibleby:3600|floatformat:0 }} hrs
                            </span>
                        </div>
                    </li>
                {% endfor %}
            </ul>
        </div>

        <div class="mt-4 text-center">
            <p class="small text-muted">Keep riding to climb the ranks!</p>
        </div>
    </div>
</body>
</html>
