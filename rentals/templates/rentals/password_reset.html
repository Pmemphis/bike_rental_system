<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container bg-white shadow rounded p-4 mx-auto" style="max-width: 400px;">
        <h4 class="text-center">Reset Password</h4>
        <p class="small text-muted">Enter your email and we'll send you a reset link.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Send Reset Email</button>
        </form>
    </div>
</body>
</html>
